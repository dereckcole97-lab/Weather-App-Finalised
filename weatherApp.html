<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weatherApp.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="image/search.png"></button>
            <!--this is where the setting up of the earch button ends-->
            <!--one of my main mistakes was here-->
        </div>
        <div class="Weather">
            <!--the img tag is the one that allows me to add the rain image-->
            <!--follow it carefully and comment all the code-->
            <img src="image/rain.png" class="Weather-icon">
            <!--this h1 class allow me to give or add to the rain image the temperature-->
            <!--all this comments will be useful for the css and js and also future projects-->
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="image/humidity.png">
                    <div>
                        <!--EVERYTHING IS GOING THE WAY IT SHOULD-->
                        <!--PROGRAM IN THE WEB GIVING THE EXPECTED RESULTS-->
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="image/wind1.png">
                    <div>
                        <p class="wind">15km.h</p>
                        <p>Wind Speed</p>
                        <!--SO FAR SO GOOD-->
                    </div>
                </div>
            </div>
        </div>
    </div>    
    <script src="weatherApp.js"></script>
</body>
</html>
